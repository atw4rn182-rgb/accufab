<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 280" role="img" aria-labelledby="title">
  <title id="title">Accu-Fab LLC</title>
  <defs>
    <linearGradient id="silver" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d8dde3" />
      <stop offset="0.24" stop-color="#aeb5bd" />
      <stop offset="0.55" stop-color="#6f767e" />
      <stop offset="0.78" stop-color="#b7bec6" />
      <stop offset="1" stop-color="#e1e5ea" />
    </linearGradient>
    <linearGradient id="blueBevel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#385f96" />
      <stop offset="0.42" stop-color="#0d2748" />
      <stop offset="0.76" stop-color="#4e79b5" />
      <stop offset="1" stop-color="#102b4e" />
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="5" flood-color="#02060b" flood-opacity="0.68" />
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#315d95" flood-opacity="0.35" />
    </filter>
    <style>
      .word {
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: 168px;
        font-style: italic;
        font-weight: 900;
        letter-spacing: -9px;
      }
      .llc {
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: 46px;
        font-weight: 900;
        letter-spacing: 1px;
