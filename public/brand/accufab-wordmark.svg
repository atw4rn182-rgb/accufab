<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 280" role="img" aria-labelledby="title">
  <title id="title">Accu-Fab LLC</title>
  <defs>
    <linearGradient id="silver" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#b9bec4" />
      <stop offset="0.22" stop-color="#8f969d" />
      <stop offset="0.5" stop-color="#565d64" />
      <stop offset="0.72" stop-color="#9da4ab" />
      <stop offset="1" stop-color="#c9ced4" />
    </linearGradient>
    <linearGradient id="blueBevel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#234a79" />
      <stop offset="0.44" stop-color="#071b34" />
      <stop offset="0.78" stop-color="#335f93" />
      <stop offset="1" stop-color="#0b2442" />
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-18%" width="116%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#02060b" flood-opacity="0.76" />
    </filter>
    <style>
      .word {
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: 168px;
        font-style: italic;
        font-weight: 900;
        letter-spacing: -9px;
      }
      .llc {
        font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: 46px;
        font-weight: 900;
        letter-spacing: 1px;
