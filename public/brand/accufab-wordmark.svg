  <g filter="url(#softShadow)" transform="translate(16 24)">
    <text class="word" x="23" y="178" transform="scale(1.72 1)" fill="none" stroke="#050b14" stroke-linejoin="round" stroke-width="34">
      ACCU-FAB
    </text>
    <text class="word" x="23" y="178" transform="scale(1.72 1)" fill="none" stroke="url(#blueBevel)" stroke-linejoin="round" stroke-width="24">
      ACCU-FAB
    </text>
    <text class="word" x="23" y="178" transform="scale(1.72 1)" fill="url(#silver)" stroke="#bcc8d5" stroke-linejoin="round" stroke-width="2">
      ACCU-FAB
    </text>
    <text class="llc" x="1045" y="225" fill="#f3f6f9" stroke="#101923" stroke-linejoin="round" stroke-width="5">
